<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E5E3F"/>
      <stop offset="100%" style="stop-color:#4A7C59"/>
    </linearGradient>
    <linearGradient id="sun1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD97D"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD97D;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFD97D;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg1)"/>

  <!-- 태양 글로우 -->
  <circle cx="1550" cy="180" r="200" fill="url(#glow1)"/>
  <circle cx="1550" cy="180" r="70" fill="url(#sun1)" opacity="0.9"/>

  <!-- 부드러운 언덕 -->
  <ellipse cx="400" cy="800" rx="700" ry="300" fill="#3D6B4F" opacity="0.5"/>
  <ellipse cx="1400" cy="800" rx="800" ry="250" fill="#3D6B4F" opacity="0.4"/>

  <!-- 나무 1 -->
  <g transform="translate(1500, 350)">
    <rect x="-8" y="60" width="16" height="100" rx="4" fill="#5A4A32" opacity="0.7"/>
    <ellipse cx="0" cy="30" rx="55" ry="60" fill="#5B8C6A" opacity="0.6"/>
    <ellipse cx="-20" cy="50" rx="35" ry="40" fill="#4A7C59" opacity="0.5"/>
    <ellipse cx="25" cy="45" rx="30" ry="35" fill="#6B9F7B" opacity="0.4"/>
  </g>

  <!-- 나무 2 -->
  <g transform="translate(1650, 380)">
    <rect x="-6" y="50" width="12" height="80" rx="3" fill="#5A4A32" opacity="0.6"/>
    <ellipse cx="0" cy="25" rx="40" ry="50" fill="#5B8C6A" opacity="0.5"/>
    <ellipse cx="15" cy="35" rx="25" ry="30" fill="#6B9F7B" opacity="0.4"/>
  </g>

  <!-- 집 (따뜻한 가정 상징) -->
  <g transform="translate(1300, 380)">
    <!-- 집 본체 -->
    <rect x="0" y="40" width="120" height="90" rx="4" fill="#F5F0E8" opacity="0.85"/>
    <!-- 지붕 -->
    <path d="M-15 45 L60 -10 L135 45 Z" fill="#C17817" opacity="0.8"/>
    <!-- 문 -->
    <rect x="45" y="75" width="30" height="55" rx="3" fill="#8B6914" opacity="0.7"/>
    <circle cx="68" cy="105" r="3" fill="#FFD97D" opacity="0.9"/>
    <!-- 창문 (빛이 새어나옴) -->
    <rect x="15" y="60" width="22" height="22" rx="2" fill="#FFD97D" opacity="0.6"/>
    <rect x="83" y="60" width="22" height="22" rx="2" fill="#FFD97D" opacity="0.6"/>
    <!-- 굴뚝 -->
    <rect x="90" y="10" width="18" height="35" rx="2" fill="#8B7355" opacity="0.7"/>
    <!-- 연기 -->
    <circle cx="99" cy="0" r="8" fill="white" opacity="0.2"/>
    <circle cx="105" cy="-15" r="6" fill="white" opacity="0.15"/>
    <circle cx="100" cy="-28" r="5" fill="white" opacity="0.1"/>
  </g>

  <!-- 어르신 부부 실루엣 (오른쪽) -->
  <g transform="translate(1150, 340)" opacity="0.75">
    <!-- 할아버지 -->
    <circle cx="0" cy="0" r="18" fill="#F5F0E8"/>
    <path d="M0 18 Q0 30 -5 55 L5 55 Q10 30 0 18Z" fill="#F5F0E8"/>
    <line x1="-5" y1="55" x2="-12" y2="95" stroke="#F5F0E8" stroke-width="7" stroke-linecap="round"/>
    <line x1="5" y1="55" x2="12" y2="95" stroke="#F5F0E8" stroke-width="7" stroke-linecap="round"/>
    <!-- 지팡이 -->
    <line x1="18" y1="35" x2="22" y2="100" stroke="#D4C5A9" stroke-width="4" stroke-linecap="round"/>

    <!-- 할머니 -->
    <g transform="translate(45, 5)">
      <circle cx="0" cy="0" r="16" fill="#F5F0E8"/>
      <path d="M0 16 Q0 28 -5 50 L5 50 Q10 28 0 16Z" fill="#F5F0E8"/>
      <line x1="-5" y1="50" x2="-10" y2="85" stroke="#F5F0E8" stroke-width="6" stroke-linecap="round"/>
      <line x1="5" y1="50" x2="10" y2="85" stroke="#F5F0E8" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- 손 잡은 표현 -->
    <line x1="12" y1="40" x2="33" y2="38" stroke="#F5F0E8" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 작은 새 -->
  <g transform="translate(1620, 250)" opacity="0.4">
    <path d="M0 0 Q-8 -8 -5 -3 Q-12 -6 -5 0 Q-5 3 0 0Z" fill="white" transform="scale(2)"/>
  </g>
  <g transform="translate(1660, 230)" opacity="0.3">
    <path d="M0 0 Q-8 -8 -5 -3 Q-12 -6 -5 0 Q-5 3 0 0Z" fill="white" transform="scale(1.5)"/>
  </g>

  <!-- 꽃 장식 (좌하단) -->
  <g transform="translate(150, 600)" opacity="0.25">
    <circle cx="0" cy="0" r="12" fill="#FFD97D"/>
    <circle cx="0" cy="-20" r="8" fill="white"/>
    <circle cx="19" cy="-6" r="8" fill="white"/>
    <circle cx="12" cy="16" r="8" fill="white"/>
    <circle cx="-12" cy="16" r="8" fill="white"/>
    <circle cx="-19" cy="-6" r="8" fill="white"/>
  </g>
  <g transform="translate(220, 580)" opacity="0.2">
    <circle cx="0" cy="0" r="8" fill="#FFD97D"/>
    <circle cx="0" cy="-14" r="6" fill="white"/>
    <circle cx="13" cy="-4" r="6" fill="white"/>
    <circle cx="8" cy="11" r="6" fill="white"/>
    <circle cx="-8" cy="11" r="6" fill="white"/>
    <circle cx="-13" cy="-4" r="6" fill="white"/>
  </g>

  <!-- 하단 물결 -->
  <path d="M0 720 Q320 680 640 720 Q960 760 1280 720 Q1600 680 1920 720 L1920 800 L0 800Z" fill="#2E5E3F" opacity="0.3"/>
  <path d="M0 750 Q480 710 960 760 Q1440 800 1920 750 L1920 800 L0 800Z" fill="white" opacity="0.06"/>
</svg>
