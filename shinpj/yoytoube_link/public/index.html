<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 트렌드 분석기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📊 YouTube 트렌드 분석기</h1>
    <p>분야별 인기 영상을 조회수·좋아요·구독자 기준으로 분석합니다</p>
    <a href="/shorts.html" class="shorts-nav-btn">🌍 상승 쇼츠</a>
    <button class="theme-toggle" id="theme-toggle">☀️ 라이트 모드</button>
  </header>

  <main>
    <div class="channel-search-wrap">
      <div class="search-type-toggle">
        <button class="search-type-btn active" data-type="channel">📺 채널</button>
        <button class="search-type-btn" data-type="video">🎬 영상</button>
      </div>
      <input id="channel-search-input" type="text" class="channel-search-input" placeholder="채널명, 키워드, URL 입력 (예: 요리, 게임, 여행 vlog...)">
      <button id="channel-search-btn" class="channel-search-btn">검색</button>
    </div>
    <div class="keywords-wrap">
      <div class="keywords-header">
        <span class="keywords-label">🔥 인기 검색어</span>
        <div class="keywords-limit-btns">
          <button class="klimit-btn active" data-limit="20">20개</button>
          <button class="klimit-btn" data-limit="50">50개</button>
          <button class="klimit-btn" data-limit="100">100개</button>
        </div>
      </div>
      <div class="keywords-cat-btns">
        <button class="kcat-btn active" data-cat="">전체</button>
        <button class="kcat-btn" data-cat="10">음악</button>
        <button class="kcat-btn" data-cat="20">게임</button>
        <button class="kcat-btn" data-cat="17">스포츠</button>
        <button class="kcat-btn" data-cat="28">과학/기술</button>
        <button class="kcat-btn" data-cat="26">교육/노하우</button>
        <button class="kcat-btn" data-cat="24">엔터테인먼트</button>
        <button class="kcat-btn" data-cat="25">뉴스/정치</button>
        <button class="kcat-btn" data-cat="22">사람/블로그</button>
      </div>
      <div id="keywords-list" class="keywords-list">불러오는 중...</div>
    </div>

    <div class="period-bar">
      <button class="period-btn active" data-period="all">전체</button>
      <button class="period-btn" data-period="daily">일간</button>
      <button class="period-btn" data-period="weekly">주간</button>
      <button class="period-btn" data-period="monthly">월간</button>
      <button class="period-btn" data-period="yearly">연간</button>
    </div>
    <div id="loading" class="loading">불러오는 중...</div>
    <div id="trending-grid" class="trending-grid"></div>
  </main>

  <script src="app.js"></script>
  <script>
    initMain();
  </script>
</body>
</html>
