<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 상승 쇼츠</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="/" class="back-btn">← 메인으로</a>
    <div>
      <h1>🌍 상승 쇼츠</h1>
      <p>언어별 YouTube 인기 상승 쇼츠 모아보기</p>
    </div>
    <button class="theme-toggle" id="theme-toggle">☀️ 라이트 모드</button>
  </header>

  <main>
    <!-- 언어 선택 -->
    <div class="region-tabs">
      <button class="region-btn active" data-lang="ko" data-label="🇰🇷 한국어">🇰🇷 한국어</button>
      <button class="region-btn" data-lang="en" data-label="🇺🇸 English">🇺🇸 English</button>
      <button class="region-btn" data-lang="ja" data-label="🇯🇵 日本語">🇯🇵 日本語</button>
      <button class="region-btn" data-lang="zh" data-label="🇹🇼 中文">🇹🇼 中文</button>
      <button class="region-btn" data-lang="hi" data-label="🇮🇳 हिन्दी">🇮🇳 हिन्दी</button>
      <button class="region-btn" data-lang="ar" data-label="🇸🇦 العربية">🇸🇦 العربية</button>
      <button class="region-btn" data-lang="th" data-label="🇹🇭 ภาษาไทย">🇹🇭 ภาษาไทย</button>
      <button class="region-btn" data-lang="fr" data-label="🇫🇷 Français">🇫🇷 Français</button>
      <button class="region-btn" data-lang="de" data-label="🇩🇪 Deutsch">🇩🇪 Deutsch</button>
      <button class="region-btn" data-lang="pt" data-label="🇧🇷 Português">🇧🇷 Português</button>
      <button class="region-btn" data-lang="es" data-label="🇪🇸 Español">🇪🇸 Español</button>
      <button class="region-btn" data-lang="id" data-label="🇮🇩 Indonesia">🇮🇩 Indonesia</button>
    </div>

    <!-- 분야 필터 -->
    <div class="shorts-filter-row">
      <span class="filter-label">분야:</span>
      <div class="shorts-cat-tabs">
        <button class="scat-btn active" data-cat="">전체</button>
        <button class="scat-btn" data-cat="10">음악</button>
        <button class="scat-btn" data-cat="20">게임</button>
        <button class="scat-btn" data-cat="17">스포츠</button>
        <button class="scat-btn" data-cat="24">엔터</button>
        <button class="scat-btn" data-cat="28">과학/기술</button>
        <button class="scat-btn" data-cat="22">브이로그</button>
      </div>
    </div>

    <div id="shorts-meta" class="shorts-meta"></div>
    <div id="loading" class="loading" style="display:none">불러오는 중...</div>
    <div id="shorts-grid" class="shorts-grid"></div>
  </main>

  <script src="app.js"></script>
  <script>
    loadTrendingShorts();
  </script>
</body>
</html>
