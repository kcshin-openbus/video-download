<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영상 다운로드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 20px; text-align: center; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .container { max-width: 700px; margin: 30px auto; padding: 0 16px; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab { padding: 10px 18px; border-radius: 8px 8px 0 0; background: #dde; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: #555; transition: all 0.2s; }
    .tab.active { background: #fff; color: #1a1a2e; box-shadow: 0 -2px 6px rgba(0,0,0,0.08); }
    .tab:hover:not(.active) { background: #ccd; }
    .card { background: #fff; border-radius: 0 12px 12px 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    .input-row input:focus { border-color: #4f6ef7; }
    .btn { padding: 12px 22px; background: #4f6ef7; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
    .btn:hover { background: #3a57e8; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .result { margin-top: 24px; }
    .video-info { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
    .video-info img { width: 140px; height: 90px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #eee; }
    .video-info .title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #222; }
    .formats { display: flex; flex-direction: column; gap: 8px; }
    .format-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f7f8ff; border: 1.5px solid #e0e4ff; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit; width: 100%; }
    .format-btn:hover { background: #eef0ff; border-color: #4f6ef7; }
    .format-quality { font-weight: 700; color: #4f6ef7; font-size: 1rem; }
    .format-ext { font-size: 0.8rem; color: #888; background: #eee; padding: 2px 8px; border-radius: 4px; }
    .format-slow { font-size: 0.75rem; color: #f90; margin-left: 6px; }
    .error-msg { margin-top: 16px; padding: 14px 16px; background: #fff3f3; border: 1px solid #ffcccc; border-radius: 8px; color: #c00; font-size: 0.9rem; }
    .loading { margin-top: 20px; text-align: center; color: #888; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: #4f6ef7; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <h1>영상 다운로드</h1>
  <p>YouTube · TikTok · Instagram · Facebook · Douyin</p>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-platform="youtube">YouTube</button>
    <button class="tab" data-platform="tiktok">TikTok</button>
    <button class="tab" data-platform="instagram">Instagram</button>
    <button class="tab" data-platform="facebook">Facebook</button>
    <button class="tab" data-platform="douyin">Douyin</button>
  </div>
  <div class="card">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
      <button class="btn" id="fetchBtn" onclick="fetchInfo()">정보 가져오기</button>
    </div>
    <div id="resultArea"></div>
  </div>
</div>

<script>
const INFO_URL = '/api/info';
const DL_URL   = '/api/download';

const placeholders = {
  youtube:   'https://www.youtube.com/watch?v=...',
  tiktok:    'https://www.tiktok.com/@.../video/...',
  instagram: 'https://www.instagram.com/reels/...',
  facebook:  'https://www.facebook.com/watch?v=...',
  douyin:    'https://www.douyin.com/video/...',
};

const state = {
  youtube:   { url: '', html: '' },
  tiktok:    { url: '', html: '' },
  instagram: { url: '', html: '' },
  facebook:  { url: '', html: '' },
  douyin:    { url: '', html: '' },
};
let cur = 'youtube';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    state[cur].url  = document.getElementById('urlInput').value;
    state[cur].html = document.getElementById('resultArea').innerHTML;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    cur = tab.dataset.platform;

    document.getElementById('urlInput').value       = state[cur].url;
    document.getElementById('urlInput').placeholder = placeholders[cur];
    document.getElementById('resultArea').innerHTML  = state[cur].html;
  });
});

async function fetchInfo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  document.getElementById('resultArea').innerHTML = `<div class="loading"><span class="spinner"></span>영상 정보를 가져오는 중...</div>`;

  try {
    const res  = await fetch(INFO_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
    const data = await res.json();
    if (data.error) {
      document.getElementById('resultArea').innerHTML = `<div class="error-msg">${data.error}</div>`;
    } else {
      renderResult(data);
    }
  } catch {
    document.getElementById('resultArea').innerHTML = `<div class="error-msg">서버에 연결할 수 없습니다.</div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data) {
  const thumb   = data.thumbnail ? `<img src="${data.thumbnail}" alt="썸네일" onerror="this.style.display='none'">` : '';
  const formats = data.formats.map(f => {
    const slow = f.needs_merge ? '<span class="format-slow">⚠ 느림</span>' : '';
    const href = `${DL_URL}?orig_url=${encodeURIComponent(data.orig_url)}&format_id=${encodeURIComponent(f.format_id || '')}&filename=${encodeURIComponent(data.title)}`;
    return `<a class="format-btn" href="${href}" download>
      <span class="format-quality">${f.quality}</span>
      <span class="format-ext">${f.ext}</span>
    </a>`;
  }).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result">
      <div class="video-info">${thumb}<div class="title">${esc(data.title)}</div></div>
      <div class="formats">${formats}</div>
    </div>`;
}

function dlDirect(encodedUrl, encodedName) {
  const a = document.createElement('a');
  a.href     = decodeURIComponent(encodedUrl);
  a.download = decodeURIComponent(encodedName);
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});
</script>
</body>
</html>
